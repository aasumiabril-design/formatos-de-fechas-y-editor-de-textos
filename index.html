<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDITOR DE FECHAS Y TEXTOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0F19;
            color: #F9FAFB;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            body {
                flex-direction: row;
            }
        }

        .sidebar { background-color: #111827; }
        .main-container { background-color: #1F2937; }
        .card { background-color: #111827; }
        .accent-cyan { color: #22D3EE; }
        .bg-cyan-custom { background-color: #06B6D4; }
        .bg-cyan-custom:hover { background-color: #0891B2; }
        
        input, select, textarea {
            background-color: #374151;
            border: 1px solid #4B5563;
            color: white;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #22D3EE;
        }

        .btn-nav.active {
            background-color: #1F2937;
            color: #22D3EE;
            border-bottom: 2px solid #22D3EE;
        }
        
        @media (min-width: 768px) {
            .btn-nav.active {
                border-bottom: none;
                border-left: 4px solid #22D3EE;
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #111827;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <!-- Sidebar / Top Nav on Mobile -->
    <aside class="sidebar w-full md:w-64 flex flex-col border-b md:border-b-0 md:border-r border-gray-800 shrink-0">
        <div class="p-4 md:p-8 text-center flex md:flex-col items-center justify-between md:justify-start">
            <div>
                <h1 class="text-xl md:text-2xl font-bold accent-cyan tracking-tighter">FECHAS Y TEXTOS</h1>
                <p class="hidden md:block text-xs text-gray-500 mt-1">EDITOR</p>
            </div>
            <div id="status-label" class="text-emerald-500 font-bold text-xs md:text-sm md:mt-4 h-6"></div>
        </div>

        <nav class="flex md:flex-col flex-1 px-2 md:px-4 pb-2 md:pb-0 space-x-2 md:space-x-0 md:space-y-2 overflow-x-auto">
            <button onclick="showView('fechas')" id="btn-fechas" class="btn-nav active whitespace-nowrap flex-1 md:flex-none flex items-center justify-center md:justify-start p-3 rounded-lg text-xs md:text-sm font-bold transition-all">
                <i class="fa-solid fa-calendar-days md:mr-3"></i> <span class="ml-2 md:ml-0">MÓDULO FECHAS</span>
            </button>
            <button onclick="showView('texto')" id="btn-texto" class="btn-nav whitespace-nowrap flex-1 md:flex-none flex items-center justify-center md:justify-start p-3 text-gray-400 rounded-lg text-xs md:text-sm font-bold hover:bg-gray-800 transition-all">
                <i class="fa-solid fa-file-lines md:mr-3"></i> <span class="ml-2 md:ml-0">PROCESADOR TEXTO</span>
            </button>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-3 md:p-6 overflow-y-auto custom-scrollbar bg-[#0B0F19]">
        <div class="main-container min-h-full rounded-2xl md:rounded-3xl p-4 md:p-8 shadow-2xl">
            
            <!-- VIEW: FECHAS -->
            <div id="view-fechas">
                <h2 class="text-xl md:text-3xl font-bold mb-6 text-center">Gestor Avanzado de Fechas</h2>
                
                <div class="card rounded-2xl p-4 md:p-6 mb-8 shadow-lg">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-6">
                        <div>
                            <label class="block text-xs md:text-sm text-gray-400 mb-2">Calendario:</label>
                            <input type="date" id="input-date" class="w-full p-3 rounded-lg text-sm">
                        </div>
                        <div>
                            <label class="block text-xs md:text-sm text-gray-400 mb-2">Pegar Texto/Fecha:</label>
                            <input type="text" id="input-manual" placeholder="Ej: 24/07/2021 o veinticuatro de julio..." class="w-full p-3 rounded-lg text-sm">
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs md:text-sm text-gray-400 mb-2">Seleccione Formato:</label>
                        <select id="select-format" class="w-full p-3 rounded-lg appearance-none cursor-pointer text-sm">
                            <option value="notarial">Notarial (Letras con Números)</option>
                            <option value="largo">Largo (Texto completo)</option>
                            <option value="dia_fecha">Día y Fecha</option>
                            <option value="administrativo">Administrativo (DD-MMM-AAAA)</option>
                            <option value="estandar">Estándar (DD/MM/AAAA)</option>
                            <option value="iso">Técnico ISO (AAAA-MM-DD)</option>
                            <option value="mes_ano">Solo Mes y Año</option>
                        </select>
                    </div>

                    <div class="flex flex-wrap justify-center gap-2 mb-8">
                        <button onclick="setCaseMode('low')" class="case-btn flex-1 md:flex-none px-3 py-2 rounded-md bg-gray-800 border border-gray-600 text-[10px] md:text-xs">minúsculas</button>
                        <button onclick="setCaseMode('up')" class="case-btn flex-1 md:flex-none px-3 py-2 rounded-md bg-gray-800 border border-gray-600 text-[10px] md:text-xs">MAYÚSCULAS</button>
                        <button onclick="setCaseMode('title')" class="case-btn flex-1 md:flex-none px-3 py-2 rounded-md bg-cyan-custom text-[10px] md:text-xs font-bold">Nombre Propio</button>
                    </div>

                    <button onclick="procesarFecha()" class="w-full bg-cyan-custom text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95 text-sm">
                        GENERAR FECHA
                    </button>
                </div>

                <div class="relative">
                    <textarea id="result-fecha" readonly class="w-full h-32 md:h-40 rounded-2xl bg-gray-900 border-2 border-cyan-400 text-cyan-400 p-4 text-center text-lg md:text-2xl font-bold flex items-center justify-center resize-none"></textarea>
                    <button onclick="copyToClipboard('result-fecha')" class="mt-4 mx-auto block bg-emerald-500 hover:bg-emerald-600 px-8 py-3 rounded-lg font-bold text-sm w-full md:w-auto">
                        COPIAR RESULTADO
                    </button>
                </div>
            </div>

            <!-- VIEW: TEXTO -->
            <div id="view-texto" class="hidden h-full flex flex-col">
                <h2 class="text-xl md:text-3xl font-bold mb-6 text-center">Procesador Inteligente de Texto</h2>
                
                <div class="flex flex-col md:flex-row flex-1 gap-4 mb-6 min-h-[400px]">
                    <div class="flex-1 flex flex-col">
                        <span class="text-[10px] uppercase text-gray-500 mb-1 ml-1">Entrada</span>
                        <textarea id="text-in" placeholder="Pegue su texto aquí..." class="flex-1 rounded-xl p-4 font-mono text-xs md:text-sm resize-none"></textarea>
                    </div>
                    <div class="flex-1 flex flex-col">
                        <span class="text-[10px] uppercase text-gray-500 mb-1 ml-1">Salida</span>
                        <textarea id="text-out" readonly placeholder="Resultado..." class="flex-1 rounded-xl p-4 font-mono text-xs md:text-sm text-cyan-400 bg-black/30 border-gray-700 resize-none"></textarea>
                    </div>
                </div>

                <div class="card rounded-2xl p-4 md:p-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:flex lg:flex-nowrap gap-2 mb-4">
                        <input type="text" id="search-input" placeholder="Buscar..." class="p-2 rounded-lg text-sm w-full">
                        <input type="text" id="replace-input" placeholder="Reemplazar por..." class="p-2 rounded-lg text-sm w-full">
                        <button onclick="ejecutarReemplazo()" class="bg-cyan-700 hover:bg-cyan-600 px-4 py-2 rounded-lg text-[10px] font-bold">CAMBIAR TODO</button>
                        <button onclick="borrarBusqueda()" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded-lg text-[10px] font-bold">BORRAR</button>
                    </div>
                    
                    <div class="flex flex-wrap gap-2 justify-center">
                        <button onclick="modTxt('low')" class="flex-1 md:flex-none bg-gray-700 px-3 py-2 rounded-lg text-[10px]">minúsculas</button>
                        <button onclick="modTxt('up')" class="flex-1 md:flex-none bg-gray-700 px-3 py-2 rounded-lg text-[10px]">MAYÚSCULAS</button>
                        <button onclick="modTxt('title')" class="flex-1 md:flex-none bg-emerald-600 px-3 py-2 rounded-lg text-[10px] font-bold">Nombre Propio</button>
                        <button onclick="quitarSaltos()" class="flex-1 md:flex-none bg-gray-600 px-3 py-2 rounded-lg text-[10px]">Quitar Saltos</button>
                        <button onclick="copyToClipboard('text-out')" class="w-full md:w-auto bg-cyan-500 px-4 py-2 rounded-lg text-[10px] font-bold">COPIAR TODO</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- ESTADO GLOBAL ---
        let currentCaseMode = 'title';
        const MESES = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
        const DIAS = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];

        // BASE: Sin fecha inicial en el calendario (se deja vacío)
        document.getElementById('input-date').value = "";

        // --- NAVEGACIÓN ---
        function showView(view) {
            document.getElementById('view-fechas').classList.toggle('hidden', view !== 'fechas');
            document.getElementById('view-texto').classList.toggle('hidden', view !== 'texto');
            document.getElementById('btn-fechas').classList.toggle('active', view === 'fechas');
            document.getElementById('btn-fechas').classList.toggle('text-gray-400', view !== 'fechas');
            document.getElementById('btn-texto').classList.toggle('active', view === 'texto');
            document.getElementById('btn-texto').classList.toggle('text-gray-400', view !== 'texto');
            if (window.innerWidth < 768) {
                document.querySelector('main').scrollTop = 0;
            }
        }

        function setCaseMode(mode) {
            currentCaseMode = mode;
            document.querySelectorAll('.case-btn').forEach(btn => {
                const text = btn.innerText.toLowerCase();
                const isSelected = (mode === 'low' && text.includes('min')) || 
                                 (mode === 'up' && text.includes('may')) || 
                                 (mode === 'title' && text.includes('propio'));
                btn.className = isSelected 
                    ? "case-btn flex-1 md:flex-none px-3 py-2 rounded-md bg-cyan-custom text-[10px] md:text-xs font-bold" 
                    : "case-btn flex-1 md:flex-none px-3 py-2 rounded-md bg-gray-800 border border-gray-600 text-[10px] md:text-xs";
            });
        }

        // --- LÓGICA DE PALABRAS A NÚMEROS (Inverso) ---
        function palabrasANumero(str) {
            if (!str) return null;
            const dict = {
                'un': 1, 'uno': 1, 'dos': 2, 'tres': 3, 'cuatro': 4, 'cinco': 5, 'seis': 6, 'siete': 7, 'ocho': 8, 'nueve': 9, 'diez': 10,
                'once': 11, 'doce': 12, 'trece': 13, 'catorce': 14, 'quince': 15, 'dieciséis': 16, 'diecisiete': 17, 'dieciocho': 18, 'diecinueve': 19,
                'veinte': 20, 'veintiuno': 21, 'veintidós': 22, 'veintitrés': 23, 'veinticuatro': 24, 'veinticinco': 25, 'veintiséis': 26, 'veintisiete': 27, 'veintiocho': 28, 'veintinueve': 29,
                'treinta': 30, 'cuarenta': 40, 'cincuenta': 50, 'sesenta': 60, 'setenta': 70, 'ochenta': 80, 'noventa': 90,
                'cien': 100, 'ciento': 100, 'doscientos': 200, 'trescientos': 300, 'cuatrocientos': 400, 'quinientos': 500, 'seiscientos': 600, 'setecientos': 700, 'ochocientos': 800, 'novecientos': 900,
                'mil': 1000, 'millon': 1000000
            };
            
            // Limpieza básica y normalización
            let cleanStr = str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            // Re-mapear el diccionario para ignorar tildes en la búsqueda
            const normalizedDict = {};
            for (let key in dict) {
                let normalizedKey = key.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                normalizedDict[normalizedKey] = dict[key];
            }

            let parts = cleanStr.replace(/ y /g, ' ').split(/[\s-]+/);
            let total = 0;
            let current = 0;
            
            for (let p of parts) {
                if (normalizedDict[p]) {
                    let val = normalizedDict[p];
                    if (val === 1000) {
                        total += (current === 0 ? 1 : current) * 1000;
                        current = 0;
                    } else if (val === 1000000) {
                        total += (current === 0 ? 1 : current) * 1000000;
                        current = 0;
                    } else {
                        current += val;
                    }
                }
            }
            return total + current;
        }

        // --- LÓGICA DE NÚMEROS A LETRAS (Español) ---
        function numeroALetras(num) {
            const unidades = ['cero', 'un', 'dos', 'tres', 'cuatro', 'cinco', 'seis', 'siete', 'ocho', 'nueve'];
            const dieces = ['diez', 'once', 'doce', 'trece', 'catorce', 'quince', 'dieciséis', 'diecisiete', 'dieciocho', 'diecinueve'];
            const decenas = ['', '', 'veinte', 'treinta', 'cuarenta', 'cincuenta', 'sesenta', 'setenta', 'ochenta', 'noventa'];
            const centenas = ['', 'ciento', 'doscientos', 'trescientos', 'cuatrocientos', 'quinientos', 'seiscientos', 'setecientos', 'ochocientos', 'novecientos'];

            if (num === 100) return "cien";
            if (num < 10) return unidades[num];
            if (num < 20) return dieces[num - 10];
            if (num < 30) return num === 20 ? "veinte" : "veinti" + unidades[num % 10];
            if (num < 100) {
                let d = Math.floor(num / 10);
                let u = num % 10;
                return decenas[d] + (u > 0 ? " y " + unidades[u] : "");
            }
            if (num < 1000) {
                let c = Math.floor(num / 100);
                let resto = num % 100;
                return (c === 1 && resto === 0) ? "cien" : centenas[c] + (resto > 0 ? " " + numeroALetras(resto) : "");
            }
            if (num < 1000000) {
                let m = Math.floor(num / 1000);
                let resto = num % 1000;
                let milStr = m === 1 ? "mil" : numeroALetras(m) + " mil";
                return milStr + (resto > 0 ? " " + numeroALetras(resto) : "");
            }
            return num.toString();
        }

        function capitalizar(str) {
            if (currentCaseMode === 'up') return str.toUpperCase();
            if (currentCaseMode === 'low') return str.toLowerCase();
            return str.toLowerCase().split(' ').map(word => {
                if (['de', 'del', 'y', 'en'].includes(word)) return word;
                return word.charAt(0).toUpperCase() + word.slice(1);
            }).join(' ');
        }

        // --- PROCESAMIENTO FECHAS ---
        function procesarFecha() {
            let dt = null;
            const manual = document.getElementById('input-manual').value.trim();
            const calVal = document.getElementById('input-date').value;
            
            if (manual) {
                const manualLower = manual.toLowerCase();
                
                // 1. Identificar el mes
                let mesIndex = -1;
                MESES.forEach((mes, i) => {
                    if (manualLower.includes(mes)) mesIndex = i;
                });

                // 2. Extraer candidatos numéricos o textuales para Día y Año
                const fragments = manualLower.split(/\bde\b/);
                
                let dia = null;
                let año = null;

                if (mesIndex !== -1 && fragments.length >= 2) {
                    let diaFragment = fragments[0].trim();
                    let añoFragment = fragments[fragments.length - 1].trim();

                    // Intentar extraer número del fragmento de día
                    let diaNumMatch = diaFragment.match(/\d+/);
                    dia = diaNumMatch ? parseInt(diaNumMatch[0]) : palabrasANumero(diaFragment);

                    // Intentar extraer número del fragmento de año
                    let añoNumMatch = añoFragment.match(/\d+/);
                    año = añoNumMatch ? parseInt(añoNumMatch[0]) : palabrasANumero(añoFragment);
                } else {
                    const nums = manual.match(/\d+/g);
                    if (nums && nums.length >= 3) {
                        if (nums[0].length === 4) { // ISO
                            año = parseInt(nums[0]); mesIndex = parseInt(nums[1]) - 1; dia = parseInt(nums[2]);
                        } else { // Estandar
                            dia = parseInt(nums[0]); mesIndex = parseInt(nums[1]) - 1; año = parseInt(nums[2]);
                        }
                    }
                }

                if (dia && mesIndex !== -1 && año) {
                    if (año < 100) año += 2000;
                    dt = new Date(año, mesIndex, dia);
                }
            } 
            
            // PRIORIDAD 2: Calendario (si manual falló o no existe)
            if ((!dt || isNaN(dt.getTime())) && calVal) {
                const parts = calVal.split('-');
                dt = new Date(parts[0], parts[1]-1, parts[2]);
            }

            if (!dt || isNaN(dt.getTime())) {
                showStatus("Error: Ingrese una fecha válida", true);
                document.getElementById('result-fecha').value = "";
                return;
            }

            const d = dt.getDate();
            const m = dt.getMonth();
            const a = dt.getFullYear();
            const fmt = document.getElementById('select-format').value;
            let res = "";

            switch(fmt) {
                case "notarial":
                    res = `${numeroALetras(d)} (${d}) de ${MESES[m]} de ${numeroALetras(a)} (${a})`;
                    break;
                case "largo":
                    res = `${numeroALetras(d)} de ${MESES[m]} de ${numeroALetras(a)}`;
                    break;
                case "dia_fecha":
                    res = `${DIAS[dt.getDay()]}, ${d} de ${MESES[m]} de ${a}`;
                    break;
                case "administrativo":
                    res = `${d.toString().padStart(2,'0')}-${MESES[m].substring(0,3).toUpperCase()}-${a}`;
                    break;
                case "estandar":
                    res = `${d.toString().padStart(2,'0')}/${(m+1).toString().padStart(2,'0')}/${a}`;
                    break;
                case "iso":
                    res = `${a}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                    break;
                case "mes_ano":
                    res = `${MESES[m]} de ${a}`;
                    break;
            }

            document.getElementById('result-fecha').value = capitalizar(res);
        }

        // --- LÓGICA TEXTO ---
        function updateOut(txt) {
            document.getElementById('text-out').value = txt;
        }

        function ejecutarReemplazo() {
            const t = document.getElementById('text-in').value;
            const b = document.getElementById('search-input').value;
            const r = document.getElementById('replace-input').value;
            if (b) updateOut(t.split(b).join(r));
        }

        function borrarBusqueda() {
            const t = document.getElementById('text-in').value;
            const b = document.getElementById('search-input').value;
            if (b) updateOut(t.split(b).join(""));
        }

        function quitarSaltos() {
            const t = document.getElementById('text-in').value;
            updateOut(t.replace(/\n/g, " "));
        }

        function modTxt(m) {
            const t = document.getElementById('text-in').value;
            if (m === 'up') updateOut(t.toUpperCase());
            else if (m === 'low') updateOut(t.toLowerCase());
            else {
                updateOut(t.toLowerCase().replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase()));
            }
        }

        // --- UTILIDADES ---
        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).value;
            if (!text) return;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showStatus("✔ COPIADO");
        }

        function showStatus(msg, isError = false) {
            const label = document.getElementById('status-label');
            label.innerText = msg;
            label.className = isError ? "text-red-500 font-bold text-xs md:text-sm h-6" : "text-emerald-500 font-bold text-xs md:text-sm h-6";
            setTimeout(() => label.innerText = "", 2000);
        }
    </script>
</body>
</html>
